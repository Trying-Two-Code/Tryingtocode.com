<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../components/art/ttc coin icon.png">
    <title>Trying to Code</title>
    <link rel="stylesheet" href="./css/shop.css">
    <link rel="stylesheet" href="./css/general.css">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/custom-elements.css">

    <script src="./scripts/collapse.js" type="module"></script>
    <script src="./scripts/web-elements/shop-elements.js" type="module"></script>
    <script src="./scripts/index.js" type="module"></script>
    <script src="./scripts/general.js" type="module"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="./scripts/web-elements/footer.js"></script>
    <script src="./scripts/firebase-backend/firebase.js" type="module" defer></script>
    <script src="./scripts/web-elements/help-beginner.js"></script>
    <script src="./scripts/web-elements/sidebar.js" type="module" defer></script>
    <script src="./scripts/store.js" type="module" defer></script>
    <script src="./scripts/web-elements/index/choice-path.js" defer></script>
    <script src="./scripts/prism.js" defer></script>
    <script src="./scripts/settings-functions.js" type="module" defer></script>
</head>
<body>
    <div style="display: flex; flex-direction: row;">
    <ttc-sidebar></ttc-sidebar>
        <div class="main-content">
            <p class="main-font coin-display" id="coin-display">you have: 10 <img class="tiny-img" src="./components/visuals/logos/coin/pixel-1.png"></img></p>
            
            <!--h1 class="main-font">ttc</h1-->
            <ul id="buy">
                <li class="main-font">
                    <ttc-shop-element
                    id="buy--double-coin-gain-10"
                    data-label="double coin gain for 10 minutes" 
                    data-price="30" 
                    data-function="doubleCoin" 
                    data-function-input="600000"
                    data-buy-amm="1">
                    </ttc-shop-element>
                </li>
                    
                <li class="main-font">
                    <ttc-shop-element
                    id="buy--bright-mode"
                    data-label="bright mode"
                    data-price="300" 
                    data-function="allowBrightMode" 
                    data-function-input=""
                    data-buy-amm="1">
                    </ttc-shop-element>
                </li>

                <li class="cursive-1">
                    <ttc-shop-element
                    id="buy--cursive"
                    data-label="fancy font"
                    data-price="300" 
                    data-function="allowFancyFont" 
                    data-function-input=""
                    data-buy-amm="1">
                    </ttc-shop-element>
                </li>
            </ul>
            <a class="main-font" href="/settings.html"> go to settings </a>
        </div>
    </div>
    
    <div class="footer-parent">
        <ttc-footer copywrite="tryingtocode" mail-to="contact@tryingtocode.com" legal-src="./legal.html" privacy-src="/privacy-policy.html"></ttc-footer>
    </div>
</body>
</html>
