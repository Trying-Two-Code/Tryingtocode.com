<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <meta name="description" content="a free, gamelike site to learn code">
    <meta property="og:title" content="Trying to Code">
    <meta property="og:image" content="https://tryingtocode.com/components/art/ttc coin icon.png">
    <meta property="og:type" content="website">
    <meta name="keywords" content="free, learn, code">
    
    <title>Trying to Code</title>

    <link rel="icon" href="/../../components/art/ttc coin icon.png">
    <link rel="stylesheet" href="../../css/general.css">
    <link rel="stylesheet" href="../../css/signin.css">
    <link rel="stylesheet" href="../../css/prism.css">
    <link rel="stylesheet" href="./signup.css">

    <script src="../../scripts/init-settings.js"></script>
    <script src="../../scripts/firebase-backend/firebase.js" type="module" defer></script>
    <script src="../../scripts/settings-functions.js" type="module" defer></script>
    <script src="./signup.js" type="module" defer></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    
    <canvas class="js-screen" id="learn-screen">
        <!--shows coins-->
    </canvas>
    <div class="signup-container">

        <div class="main-font center-all">
            <!--ttc-sign-in></ttc-sign-in-->
            <div data-js-tag="">
                <h1 class="main-font">sign up!</h1>
            </div>
            <div class="footer-parent">
                <ttc-footer copywrite="tryingtocode" mail-to="contact@tryingtocode.com" legal-src="../../legal.html" privacy-src="/privacy-policy.html" class="footer-parent"></ttc-footer>
            </div>
        </div>

        <div>
            <textarea data-js-tag="username-field" class="input-box si-input main-font" placeholder="username" name="username" id="" required minlength="5" maxlength="100" rows="3"></textarea>
            <input data-js-tag="password-field" autocomplete="current-password" type="password" class="input-box si-input main-font" placeholder="password" name="password" id="" minlength="5" maxlength="100" rows="1" required></input>
        </div>
    </div>

</body>
</html>
