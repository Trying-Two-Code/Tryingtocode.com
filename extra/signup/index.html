<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <meta name="description" content="a free, gamelike site to learn code">
    <meta property="og:title" content="Trying to Code">
    <meta property="og:image" content="https://tryingtocode.com/components/art/ttc coin icon.png">
    <meta property="og:type" content="website">
    <meta name="keywords" content="free, learn, code">
    
    <title>Trying to Code</title>

    <link rel="icon" href="/../../components/art/ttc coin icon.png">
    <link rel="stylesheet" href="../../css/general.css">
    <link rel="stylesheet" href="../../css/signin.css">
    <link rel="stylesheet" href="../../css/prism.css">
    <link rel="stylesheet" href="./signup.css">

    <script src="../../scripts/init-settings.js"></script>
    <script src="../../scripts/firebase-backend/firebase.js" type="module" defer></script>
    <script src="../../scripts/settings-functions.js" type="module" defer></script>
    <script src="./signup.js" type="module" defer></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    
    <canvas class="js-screen" id="learn-screen">
        <!--shows coins-->
    </canvas>


    <div class="signup-container">

        <div class="main-font center-all">
            <form class="actual-factual-sign-in-box">
                <!--img class="signup-logo" src="/components/visuals/logos/coin/pixel-1.png" alt="ttc"-->
                <!--ttc-sign-in></ttc-sign-in-->
                
                <div class="log-me-in hide" name="sign-up-toggle">
                    <label for="log-me-in" class="horrible-label">sign me up</label>
                    <input data-js-tag="log-me-in" type="checkbox" value="stay-in" id="log-me-in" class="annoying-element horrible-input" required></input>
                </div>
                <div class="dont-show-progress hide" name="dont-show-useful">
                    <label for="dont-show-progress" class="horrible-label">don't show progress</label>
                    <input data-js-tag="dont-show-progress" type="checkbox" value="stay-in" id="dont-show-progress" class="annoying-element horrible-input" required></input>
                </div>
                <div class="weird-names hide" name="weird-names">
                    <label for="dont-show-progress" class="horrible-label">make weird names</label>
                    <input data-js-tag="weird-names" type="checkbox" value="stay-in" id="weird-names" class="annoying-element horrible-input" required></input>
                </div>

                <div class="main-inputs">
                    <div data-js-tag="" class="signup-title-container">
                        <h1 class="main-font signup-title" data-js-tag="sign-up-title">sign up!</h1>
                    </div>
                    <div data-js-tag="signup-input-acc-type" class="signup-input hide">
                        <label for="acc-type">Type of Account</label>
                        <select name="acc-type" id="acc-type">
                            <option value="happy user">happy user</option>
                            <option value="wet towel user">wet towel user</option>
                            <option value="industrial boi">industrial boi</option>
                            <option value="user with a cat">user with a cat</option>
                            <option value="buisness account">buisness account</option>
                            <option value="angry user">angry user</option>
                            <option value="tired user">tired user</option>
                            <option value="that is enough user types">that is enough user types</option>
                            <option value="user who enjoys ice cream">user who enjoys ice cream</option>
                        </select>
                    </div>
                    <div data-js-tag="weird-shapes-container" name="weird-shapes-container" class="hide">
                        <img src="./image/weird-shape/" alt="weirdshape" data-js-tag="weird-shapes-image">
                        <label for="weird-shapes-side-selection">How Many Sides?</label>
                        <select name="" id="weird-shapes-side-selection" data-js-tag="weird-shapes-side-selection">
                            <option value="49">49</option>
                            <option value="48">48</option>
                            <option value="47">47</option>
                            <option value="46">46</option>
                            <option value="45">45</option>
                            <option value="44">44</option>
                            <option value="43">43</option>
                            <option value="42">42</option>
                            <option value="41">41</option>
                            <option value="40">40</option>
                            <option value="39">39</option>
                            <option value="38">38</option>
                            <option value="37">37</option>
                            <option value="36">36</option>
                            <option value="35">35</option>
                            <option value="34">34</option>
                            <option value="33">33</option>
                            <option value="32">32</option>
                            <option value="31">31</option>
                            <option value="30">30</option>
                            <option value="29">29</option>
                            <option value="28">28</option>
                            <option value="27">27</option>
                            <option value="26">26</option>
                            <option value="25">25</option>
                            <option value="24">24</option>
                            <option value="23">23</option>
                            <option value="22">22</option>
                            <option value="21">21</option>
                            <option value="20">20</option>
                            <option value="19">19</option>
                            <option value="18">18</option>
                            <option value="17">17</option>
                            <option value="16">16</option>
                            <option value="15">15</option>
                            <option value="14">14</option>
                            <option value="13">13</option>
                            <option value="12">12</option>
                            <option value="11">11</option>
                            <option value="10">10</option>
                            <option value="9">9</option>
                            <option value="8">8</option>
                            <option value="7">7</option>
                            <option value="6">6</option>
                            <option value="5">5</option>
                            <option value="4">4</option>
                            <option value="3">3</option>
                            <option value="2">2</option>
                            <option value="1">1</option>
                            <option value="0">0</option>
                        </select>
                    </div>
                    <div class="gender hide" name="gender-field">
                        <label for="gender-input" class="horrible-label">are you they/slay?</label>
                        <input data-js-tag="gender-input-information" type="checkbox" value="stay-in" id="gender-input" class="horrible-input" required></input>
                    </div>
                    <div class="hide" name="spaceship-field">
                        <label for="spaceship-input" class="horrible-label">spaceships</label>
                        <input data-js-tag="spaceship-input-information" type="checkbox" value="stay-in" id="spaceship-input" class="horrible-input" required></input>
                    </div>
                    <div class="hide" name="spikes-field">
                        <label for="spikes-input" class="horrible-label">add spikes</label>
                        <input data-js-tag="spikes-input-information" type="checkbox" value="stay-in" id="spikes-input" class="horrible-input" required></input>
                    </div>
                    <div class="hide" name="address-field">
                        <input data-js-tag="address-field" pattern="^[a-zA-Z0-9\s,.'-]{10,}$" class="input-box si-input main-font" placeholder="address" name="adress" id="" required minlength="10" maxlength="100" rows="3"></input>
                    </div>
                    <p data-js-tag="user-see-errors" class="hide red-text">null</p>
                    <div class="hide">
                        <input type="email" data-js-tag="email-field" class="input-box si-input main-font" placeholder="email" name="email" id="" required minlength="5" maxlength="100" pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$" rows="3"></input>
                    </div>
                    <input data-js-tag="username-field" class="input-box si-input main-font" placeholder="username" name="username" id="" required minlength="5" maxlength="100" rows="3"></input>
                    <p data-js-tag="fps-counter" class="main-font fps">fps:1</p>
                    <button data-js-tag="swap-elements" class="main-font hide swap-elements-button">swap random elements</button>
                    <input data-js-tag="password-field" autocomplete="new-password" type="password" class="input-box si-input main-font" placeholder="password" name="password" id="" pattern=".{5,}" minlength="5" maxlength="100" rows="1" required></input>
                    
                    <div class="show-unnecessary-container" name="show-unnecessary">
                        <label for="show-unnecessary" class="horrible-label">unnecessary info</label>
                        <input data-js-tag="show-unnecessary-information" type="checkbox" value="stay-in" id="show-unnecessary" class="horrible-input" required></input>
                    </div>

                    <div class="row-container left-side">
                        <button data-js-tag="submit-button" class="nice-bg-button nice-button left-side main-font big-button">
                            sign up
                            <!--img src="../../components/visuals/icons/project/run-code/pixel-1.png" alt="submit"-->
                        </button>
                        <!--div>
                            <label for="stay-logged-in" class="horrible-label">keep me logged in</label>
                            <input data-js-tag="stay-logged-in" class="annoying-element horrible-input" type="checkbox" value="stay-in" id="stay-logged-in" checked></input>
                        </div-->
                    </div>
                </div>
            </form>
            
        </div>
    </div>        
    
    <img data-js-tag="big-dog-image" class="dog-image annoying-element annoying-image hide petme" src="./image/jaclou-dl-eurasier-aloha-puppy-9442845 (1).webp" alt=""></img>


</body>
</html>
