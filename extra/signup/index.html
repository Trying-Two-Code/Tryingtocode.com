<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <meta name="description" content="a free, gamelike site to learn code">
    <meta property="og:title" content="Trying to Code">
    <meta property="og:image" content="https://tryingtocode.com/components/art/ttc coin icon.png">
    <meta property="og:type" content="website">
    <meta name="keywords" content="free, learn, code">
    
    <title>Trying to Code</title>

    <link rel="icon" href="/../../components/art/ttc coin icon.png">
    <link rel="stylesheet" href="../../css/general.css">
    <link rel="stylesheet" href="../../css/signin.css">
    <link rel="stylesheet" href="../../css/prism.css">
    <link rel="stylesheet" href="./signup.css">

    <script src="../../scripts/init-settings.js"></script>
    <script src="../../scripts/firebase-backend/firebase.js" type="module" defer></script>
    <script src="../../scripts/settings-functions.js" type="module" defer></script>
    <script src="./signup.js" type="module" defer></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    
    <canvas class="js-screen" id="learn-screen">
        <!--shows coins-->
    </canvas>


    <div class="signup-container">
        <img data-js-tag="big-dog-image" class="annoying-element annoying-image hide petme" src="./image/jaclou-dl-eurasier-aloha-puppy-9442845 (1).webp" alt=""></img>

        <div class="main-font center-all">
            <form class="actual-factual-sign-in-box">
                <!--ttc-sign-in></ttc-sign-in-->
                <div data-js-tag="">
                    <h1 class="main-font">sign up!</h1>
                </div>
                
                <div class="log-me-in" name="sign-up-toggle">
                    <label for="log-me-in" class="horrible-label">sign me up</label>
                    <input data-js-tag="log-me-in" type="checkbox" value="stay-in" id="log-me-in" class="annoying-element horrible-input" required></input>
                </div>
                <div class="dont-show-progress hide" name="dont-show-useful">
                    <label for="dont-show-progress" class="horrible-label">don't show progress</label>
                    <input data-js-tag="dont-show-progress" type="checkbox" value="stay-in" id="dont-show-progress" class="annoying-element horrible-input" required></input>
                </div>
                <div class="" name="show-unnecessary">
                    <label for="show-unnecessary" class="horrible-label">show unnecessary information</label>
                    <input data-js-tag="show-unnecessary-information" type="checkbox" value="stay-in" id="show-unnecessary" class="horrible-input" required></input>
                </div>

                <div>
                    <div class="gender hide" name="gender-field">
                        <label for="gender-input" class="horrible-label">are you they/slay?</label>
                        <input data-js-tag="gender-input-information" type="checkbox" value="stay-in" id="gender-input" class="horrible-input" required></input>
                    </div>
                    <div class="hide" name="address-field">
                        <input data-js-tag="address-field" pattern="^[a-zA-Z0-9\s,.'-]{10,}$" class="input-box si-input main-font" placeholder="address" name="adress" id="" required minlength="10" maxlength="100" rows="3"></input>
                    </div>
                    <div class="hide">
                        <input type="email" data-js-tag="email-field" class="input-box si-input main-font" placeholder="email" name="email" id="" required minlength="5" maxlength="100" pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$" rows="3"></input>
                    </div>
                    <input data-js-tag="username-field" class="input-box si-input main-font" placeholder="username" name="username" id="" required minlength="5" maxlength="100" rows="3"></input>
                    <p data-js-tag="fps-counter" class="main-font fps">fps:1</p>
                    <button data-js-tag="swap-elements" class="main-font hide swap-elements-button">swap random elements</button>
                    <input data-js-tag="password-field" autocomplete="new-password" type="password" class="input-box si-input main-font" placeholder="password" name="password" id="" pattern=".{5,}" minlength="5" maxlength="100" rows="1" required></input>
                </div>

                <div class="row-container left-side">
                    <button data-js-tag="submit-button" class="nice-bg-button nice-button left-side main-font">
                        create account
                        <!--img src="../../components/visuals/icons/project/run-code/pixel-1.png" alt="submit"-->
                    </button>
                    <div>
                        <label for="stay-logged-in" class="horrible-label">keep me logged in</label>
                        <input data-js-tag="stay-logged-in" class="annoying-element horrible-input" type="checkbox" value="stay-in" id="stay-logged-in" checked></input>
                    </div>
                </div>
            </form>
            
        </div>

    </div>

</body>
</html>
