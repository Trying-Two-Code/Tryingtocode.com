<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <meta name="description" content="a free, gamelike site to learn code">
    <meta property="og:title" content="Trying to Code">
    <meta property="og:image" content="https://tryingtocode.com/components/art/ttc coin icon.png">
    <meta property="og:type" content="website">
    <meta name="keywords" content="free, learn, code">
    
    <title>Trying to Code</title>

    <link rel="icon" href="../components/art/ttc coin icon.png">
    <link rel="stylesheet" href="./css/general.css">
    <link rel="stylesheet" href="./css/custom-elements.css">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/prism.css">

    <script src="./scripts/youtube.js"></script>

    <script src="./scripts/init-settings.js"></script>
    <!--script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script-->
    <script src="./scripts/index.js" type="module"></script>
    <script src="./scripts/general.js" type="module"></script>
    <script src="./scripts/firebase-backend/firebase.js" type="module" defer></script>
    <script src="./scripts/web-elements/footer.js"></script>
    <script src="./scripts/web-elements/help-beginner.js"></script>
    <script src="./scripts/web-elements/sidebar.js" type="module" defer></script>
    <script src="./scripts/web-elements/index/choice-path.js" defer></script>
    <script src="./scripts/prism.js" defer></script>
    <script src="./scripts/settings-functions.js" type="module" defer></script>

    <script src="./test.js" type="module" defer></script>

    <script type="application/ld+json">{
    "@context": "https://schema.org",
    "@type": ["SoftwareApplication", "Course"],
    "name": "Trying to Code: Learn Python",
    "description": "A free, gamelike curriculum to learn python.",
    "applicationCategory": "Educational Game",
    "operatingSystem": "Any",
    "educationalLevel": "Beginner",
    "provider": {
        "@type": "Organization",
        "name": "Trying to Code",
        "sameAs": "https://tryingtocode.com/learn"
    },
    "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "category": "Free"
    }
    }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="youtube-player" data-js-tag="youtube-player" class="nice-video"></div>
    <!--         users should be here for 10 seconds before leaving to a different page              -->
    <ttc-help-beginner-popup showup-time="10" max-xp="50" tutorial-name="tutorial-0"  video-id="MDOtgp9vq70"></ttc-help-beginner-popup>

    <div class="row-container">
        <canvas class="js-screen" id="learn-screen"></canvas>
        
        <ttc-sidebar start-closed="true"></ttc-sidebar>

        <div class="main-content main-font nes-container is-dark with-title">
            <div id="welcome" class="welcome">
                <div class="welcome--demo bevel-corners">
                    <div class="column-container" data-js-tag="first-code-example">
                        <div class="code-lines welcome--demo--input nes-textarea" id="welcome--demo--input">
                            <pre class="code-highlight" name="pretty-pre"><code class="main-font language-python welcome--demo--input--text" name="pretty-code" id="code-content">print('learn code')</code></pre>
                        </div>

                        <style>.row-container{display: flex; flex-direction: row; justify-content: center;}</style>

                        <button class="run-code welcome--demo--output-button nice-button" id="welcome--demo--output-button">
                            <img class="welcome--demo--output-img" src="./components/visuals/icons/project/run-code/pixel-1.png" alt="run code" draggable="false">
                        </button>
                        <script>let runCodeEl = document.querySelector(".welcome--demo--output-img"); runCodeEl.src = `./components/visuals/icons/project/run-code/${window.TTC.theme}${window.TTC.imageExtension}`;</script>
                        <div class="code-lines welcome--demo--output row-container">
                            <p class="welcome--demo--output--text" id="welcome--demo--output--text"></p>
                        </div>

                        <!--div class="row-container">
                            <img class="welcome--demo--arrow welcome-img" src="./components/visuals/icons/arrow/pixel-1.png" alt="->" draggable="false">
                            <script>let arrowEl = document.querySelector(".welcome--demo--arrow"); arrowEl.src = `./components/visuals/icons/arrow/${window.TTC.theme}${window.TTC.imageExtension}`;</script>
                            <a href="learn" title="Learn" class="welcome--demo--learn">
                                <style>.pad-top-30{padding-top: 30px;}</style>
                                <button class="welcome--demo--learn-button pad-top-30" draggable="false"><img class="nice-button welcome-img welcome--demo--learn-button-img" src="./components/visuals/icons/sidebar/learn/pixel-1.png" alt="learn" draggable="false"></button>
                                <script>let learnCodeEl = document.querySelector(".welcome--demo--learn-button-img"); learnCodeEl.src = `./components/visuals/icons/sidebar/learn/${window.TTC.theme}${window.TTC.imageExtension}`;</script>
                            </a>
                        </div-->
                    </div>
                    <button data-js-tag='next-part-button' class="hide nice-button no-bg-button">
                        <img src="./components/visuals/icons/arrow/pixel-1.png" alt="next" class="welcome--demo--next-img">
                    </button>
                    <div data-js-tag="second-example" class="hide">
                        <ttc-choice-path data-choices="learn"></ttc-choice-path>
                        <!--div class="hide welcome--demo">
                            <a href="/learn">
                                <img class="nice-button" src="./components/visuals/icons/sidebar/learn/pixel-1.png" alt="start learning now">
                            </a>
                            <br></br>
                            <a href="/looking">
                                <img class="nice-button" src="./components/visuals/icons/sidebar/learn/pixel-1.png" alt="start learning now">
                            </a>
                            <a href="/learn">is this the place for me?</a>
                        </div-->
                    </div>
                </div>

            </div>


            <div class="row-container" style="justify-content: space-around;">
                <p class="welcome--p">(by the way, it's free)</p>
                <button class="nice-button no-bg-button arial-1" id="hate-pixel-art-button">I hate pixel art</button>
                <button class="nice-button no-bg-button hide pixel-1" id="like-pixel-art-button">I like pixel art</button>
            </div>

            <!--div class="welcome--sign-in">
                <a href="#signin" title="Learn">
                    <button class="welcome--demo--learn" id="toggle-signinup"><img class="nice-button" src="./components/art/profile - 4.png" alt=""></button>
                </a>
                <div id="sign-in-holder"></div>
            </div-->

            <div class="footer-parent">
                <ttc-footer copywrite="tryingtocode" mail-to="contact@tryingtocode.com" legal-src="./legal.html" privacy-src="/privacy-policy.html"></ttc-footer>
            </div>
        </div> 
    
    </div> 
</body>
</html>
